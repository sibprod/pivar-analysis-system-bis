<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecture cognitive v3.1bis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --p1c:#0C447C;--p1bg:#deedf8;--p1bd:#378ADD;
  --p2c:#27500A;--p2bg:#d8ecbe;--p2bd:#639922;
  --p3c:#633806;--p3bg:#f5ddb0;--p3bd:#BA7517;
  --p4c:#3C3489;--p4bg:#dedcfa;--p4bd:#7F77DD;
  --p5c:#712B13;--p5bg:#f5d4c8;--p5bd:#D85A30;
  --ouic:#085041;--ouibg:#c4edd9;
  --nonc:#791F1F;--nonbg:#fcd4d4;
  --gc:#444441;--gbg:#e8e6df;--gbd:#B4B2A9;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --bg:#f5f3ee;--white:#fff;--border:#dddad2;
}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* ── LOADING / ERROR ── */
#loading,#error{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;flex-direction:column;gap:12px;
  font-size:14px;color:var(--text2);
}
#loading .spinner{
  width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--text2);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#error{color:var(--nonc);}
#error .err-title{font-size:16px;font-weight:500;}
#error .err-msg{font-size:12px;color:var(--text3);}

/* ── HEADER ── */
header{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:.9rem 1.5rem;position:sticky;top:0;z-index:200;
  display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
}
header h1{font-family:Georgia,serif;font-size:17px;font-weight:normal;}
.badge{font-size:10px;background:var(--p4bg);color:var(--p4c);border-radius:4px;padding:2px 8px;font-weight:600;}
.meta{font-size:11px;color:var(--text3);}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);}
.ld{width:9px;height:9px;border-radius:2px;}

/* ── FILTERS ── */
.filters{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:.4rem 1.5rem;display:flex;gap:5px;flex-wrap:wrap;
  align-items:center;position:sticky;top:52px;z-index:190;
}
.filters label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;}
.sep{color:var(--border);margin:0 4px;}
.fb{
  border:1px solid var(--border);background:transparent;border-radius:4px;
  padding:2px 8px;font-size:10.5px;cursor:pointer;color:var(--text2);
  font-family:inherit;transition:all .1s;
}
.fb:hover{border-color:var(--text2);color:var(--text);}
.fb.on{background:var(--text);color:var(--white);border-color:var(--text);}

/* ── STATS ── */
.stats{display:flex;gap:8px;flex-wrap:wrap;padding:.75rem 1.5rem;}
.stat{
  background:var(--white);border:1px solid var(--border);
  border-radius:5px;padding:.4rem .8rem;text-align:center;min-width:90px;
}
.stat-n{font-family:Georgia,serif;font-size:20px;line-height:1;}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}

/* ── TABLE ── */
.tbl-wrap{padding:0 1.5rem 2rem;overflow-x:auto;}
table{
  width:100%;border-collapse:collapse;background:var(--white);
  border:1px solid var(--border);border-radius:6px;overflow:hidden;
}
thead tr{background:#eceae4;}
th{
  text-align:left;padding:6px 8px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;color:var(--text2);
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{padding:7px 8px;border-bottom:1px solid #edeae4;vertical-align:top;line-height:1.45;}
tr:last-child td{border-bottom:none;}
tr.hidden{display:none;}
tr:not(.hidden):hover td{background:#faf8f3;}

/* ── PILLS ── */
.pill{display:inline-block;border-radius:3px;padding:1px 6px;font-size:9.5px;font-weight:700;line-height:1.7;white-space:nowrap;vertical-align:middle;}
.p1{background:var(--p1bg);color:var(--p1c);}
.p2{background:var(--p2bg);color:var(--p2c);}
.p3{background:var(--p3bg);color:var(--p3c);}
.p4{background:var(--p4bg);color:var(--p4c);}
.p5{background:var(--p5bg);color:var(--p5c);}
.oui{background:var(--ouibg);color:var(--ouic);}
.non{background:var(--nonbg);color:var(--nonc);}
.gry{background:var(--gbg);color:var(--gc);}
.coeur{background:var(--text);color:var(--white);}
.sc-tag{
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  color:var(--text3);border:1px solid var(--gbd);border-radius:3px;
  padding:1px 5px;display:inline-block;
}
.qid{font-size:12px;font-weight:700;color:var(--text);}
.s{font-size:11px;}.m{color:var(--text2);}.i{font-style:italic;}
.aln{color:var(--ouic);font-size:11px;}.sft{color:var(--nonc);font-size:11px;}
details summary{cursor:pointer;font-size:9.5px;color:var(--p4c);margin-top:3px;list-style:none;}
details summary::before{content:'▶ ';font-size:8px;}
details[open] summary::before{content:'▼ ';}
details p{
  font-size:10px;color:var(--text2);font-style:italic;margin-top:3px;
  padding:4px 7px;background:#faf8f3;
  border-left:2px solid var(--gbd);border-radius:0 3px 3px 0;line-height:1.5;
}
</style>
</head>
<body>

<!-- LOADING STATE -->
<div id="loading">
  <div class="spinner"></div>
  <span>Chargement de l'analyse…</span>
</div>

<!-- ERROR STATE -->
<div id="error" style="display:none">
  <div class="err-title">Impossible de charger l'analyse</div>
  <div class="err-msg" id="err-detail"></div>
</div>

<!-- MAIN CONTENT (hidden until data loaded) -->
<div id="app" style="display:none">

<header>
  <h1 id="hdr-title">Lecture cognitive</h1>
  <span class="badge">v3.1bis</span>
  <span class="meta" id="hdr-meta"></span>
  <div class="legend">
    <div class="leg"><div class="ld" style="background:var(--p1bg);border:1px solid var(--p1bd)"></div>P1</div>
    <div class="leg"><div class="ld" style="background:var(--p2bg);border:1px solid var(--p2bd)"></div>P2</div>
    <div class="leg"><div class="ld" style="background:var(--p3bg);border:1px solid var(--p3bd)"></div>P3</div>
    <div class="leg"><div class="ld" style="background:var(--p4bg);border:1px solid var(--p4bd)"></div>P4</div>
    <div class="leg"><div class="ld" style="background:var(--p5bg);border:1px solid var(--p5bd)"></div>P5</div>
    <div class="leg"><div class="ld" style="background:var(--text)"></div>★ Gouverne</div>
  </div>
</header>

<div class="filters">
  <label>Scénario</label>
  <button class="fb on" onclick="filt(this,'sc','all')">Tous</button>
  <button class="fb" onclick="filt(this,'sc','SOMMEIL')">Sommeil</button>
  <button class="fb" onclick="filt(this,'sc','WEEKEND')">Week-end</button>
  <button class="fb" onclick="filt(this,'sc','ANIMAL_1')">Animal 1</button>
  <button class="fb" onclick="filt(this,'sc','ANIMAL_2')">Animal 2</button>
  <button class="fb" onclick="filt(this,'sc','PANNE')">Panne</button>
  <span class="sep">|</span>
  <label>Gouverne</label>
  <button class="fb on" onclick="filt(this,'gov','all')">Tous</button>
  <button class="fb" onclick="filt(this,'gov','P1')">P1</button>
  <button class="fb" onclick="filt(this,'gov','P2')">P2</button>
  <button class="fb" onclick="filt(this,'gov','P3')">P3</button>
  <button class="fb" onclick="filt(this,'gov','P4')">P4</button>
  <button class="fb" onclick="filt(this,'gov','P5')">P5</button>
  <span class="sep">|</span>
  <label>Alignement</label>
  <button class="fb on" onclick="filt(this,'aln','all')">Tous</button>
  <button class="fb" onclick="filt(this,'aln','yes')">Demandé = gouverne</button>
  <button class="fb" onclick="filt(this,'aln','no')">Glissement</button>
</div>

<div class="stats" id="stats-bar"></div>

<div class="tbl-wrap">
<table>
<thead><tr>
  <th>Q</th>
  <th>Scénario</th>
  <th>Demandé</th>
  <th>Répond Q</th>
  <th>Répond Sit.</th>
  <th style="min-width:165px">v2_analyse</th>
  <th style="min-width:165px">cog_comprend</th>
  <th style="min-width:210px">cog_outils_mobilises</th>
  <th style="min-width:145px">cog_pilier_sortie + commentaire</th>
  <th>cog_pilier_gouverne ★</th>
  <th style="min-width:210px">cog_gouverne_commentaire</th>
  <th style="min-width:160px">cog_resultat_vise</th>
</tr></thead>
<tbody id="TB"></tbody>
</table>
</div>

</div><!-- #app -->

<script>
const pc={P1:'p1',P2:'p2',P3:'p3',P4:'p4',P5:'p5'};
const scL={SOMMEIL:'Sommeil',WEEKEND:'Week-end',ANIMAL_1:'Animal 1',ANIMAL_2:'Animal 2',PANNE:'Panne'};
function pp(t,c){return`<span class="pill ${c}">${t}</span>`;}
function ppill(p){return pp(p,pc[p]||'gry');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Récupère le candidate_ID depuis l'URL : /visualiser/etape1/{candidate_ID} ── */
function getCandidateID(){
  const parts=window.location.pathname.split('/').filter(Boolean);
  return parts[parts.length-1]||null;
}

/* ── Calcule les stats depuis les lignes ── */
function buildStats(rows){
  const total=rows.length;
  const repOui=rows.filter(r=>r.v2_repond_question==='OUI').length;
  const govCount={P1:0,P2:0,P3:0,P4:0,P5:0};
  let gliss=0;
  rows.forEach(r=>{
    if(r.cog_pilier_gouverne) govCount[r.cog_pilier_gouverne]=(govCount[r.cog_pilier_gouverne]||0)+1;
    if(r.pilier!==r.cog_pilier_gouverne) gliss++;
  });
  const sorted=Object.entries(govCount).sort((a,b)=>b[1]-a[1]);
  const colors={'P1':'var(--p1c)','P2':'var(--p2c)','P3':'var(--p3c)','P4':'var(--p4c)','P5':'var(--p5c)'};
  let html=`
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Questions</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--ouic)">${repOui}</div><div class="stat-l">Répond Q</div></div>`;
  sorted.forEach(([p,n])=>{
    if(n>0) html+=`<div class="stat"><div class="stat-n" style="color:${colors[p]}">${n}</div><div class="stat-l">Gouverne ${p}</div></div>`;
  });
  html+=`<div class="stat"><div class="stat-n" style="color:var(--nonc)">${gliss}</div><div class="stat-l">Glissements</div></div>`;
  document.getElementById('stats-bar').innerHTML=html;
}

/* ── Construit le tableau ── */
function buildTable(rows){
  const tb=document.getElementById('TB');
  tb.innerHTML='';
  rows.forEach(r=>{
    const aln=r.pilier===r.cog_pilier_gouverne;
    const vs=r.v2_repond_situation||'';
    const vsC=vs.startsWith('OUI')?'oui':'non';
    const vsL=vs.replace('OUI_','');
    const tr=document.createElement('tr');
    tr.dataset.sc=r.scenario_nom||'';
    tr.dataset.gov=r.cog_pilier_gouverne||'';
    tr.dataset.aln=aln?'yes':'no';
    tr.innerHTML=`
      <td><span class="qid">${esc(r.id_question)}</span></td>
      <td><span class="sc-tag">${esc(scL[r.scenario_nom]||r.scenario_nom)}</span></td>
      <td>${ppill(r.pilier)}</td>
      <td>${pp(r.v2_repond_question||'', r.v2_repond_question==='OUI'?'oui':'non')}</td>
      <td>${pp(vsL,vsC)}</td>
      <td class="s m">${esc(r.v2_analyse||'')}
        <details><summary>verbatim</summary><p>${esc(r.response_text||'')}</p></details>
      </td>
      <td class="s">${esc(r.cog_comprend||'')}</td>
      <td class="s m i">${esc(r.cog_outils_mobilises||'')}</td>
      <td class="s m">${ppill(r.cog_pilier_sortie)} ${esc(r.cog_sortie_commentaire||'')}</td>
      <td style="text-align:center">
        ${pp(r.cog_pilier_gouverne||'','coeur pill')}
        <br><span class="${aln?'aln':'sft'}">${aln?'✓':'↗'}</span>
      </td>
      <td class="s">${esc(r.cog_gouverne_commentaire||'')}</td>
      <td class="s m">${esc(r.cog_resultat_vise||'')}</td>`;
    tb.appendChild(tr);
  });
}

/* ── Filtres ── */
const S={sc:'all',gov:'all',aln:'all'};
function filt(btn,dim,val){
  S[dim]=val;
  document.querySelectorAll('.fb').forEach(b=>{
    const m=(b.getAttribute('onclick')||'').match(/filt\(this,'(\w+)','(\w+)'\)/);
    if(m&&m[1]===dim) b.classList.toggle('on',m[2]===val);
  });
  document.querySelectorAll('#TB tr').forEach(tr=>{
    const show=
      (S.sc==='all'||tr.dataset.sc===S.sc)&&
      (S.gov==='all'||tr.dataset.gov===S.gov)&&
      (S.aln==='all'||tr.dataset.aln===S.aln);
    tr.classList.toggle('hidden',!show);
  });
}

/* ── INIT : appel API ── */
async function init(){
  const candidateID=getCandidateID();
  if(!candidateID){
    showError('Aucun identifiant candidat dans l\'URL.','Format attendu : /visualiser/etape1/{candidate_ID}');
    return;
  }

  try{
    const url=`https://pivar-analysis-system-bis.onrender.com/visualiser/etape1/${candidateID}`;
    const resp=await fetch(url);
    if(!resp.ok) throw new Error(`HTTP ${resp.status} — ${resp.statusText}`);
    const data=await resp.json();

    /* Le service renvoie soit { rows: [...] } soit directement un tableau */
    const rows=Array.isArray(data)?data:(data.rows||data.records||[]);
    if(!rows.length) throw new Error('Aucune réponse trouvée pour ce candidat.');

    /* Header */
    const prenom=rows[0].Prenom||rows[0].prenom||candidateID;
    document.title=`Lecture cognitive · ${prenom}`;
    document.getElementById('hdr-title').textContent=`Lecture cognitive · ${prenom}`;
    document.getElementById('hdr-meta').textContent=`${rows.length} questions · 5 scénarios`;

    buildStats(rows);
    buildTable(rows);

    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';

  }catch(err){
    showError('Erreur lors du chargement',err.message);
  }
}

function showError(title,msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('err-detail').textContent=msg||'';
  document.getElementById('error').style.display='flex';
  document.querySelector('#error .err-title').textContent=title;
}

init();
</script>
</body>
</html>
