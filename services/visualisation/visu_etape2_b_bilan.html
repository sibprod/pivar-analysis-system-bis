<!DOCTYPE html>
<!--
  BILAN DYNAMIQUE · les 4 excellences · v1 · 2026-06-05 · Sib Prod
  Page autonome : lit candidat_id dans l'URL (?c= ou /bilan/:id), fetch JSON serveur,
  remplit le DOM en JS. Mise en page = template validé bilan_remi.html (MD5 462e9cb2…),
  typo remplacée par celle de l'Étape 1 (Playfair Display / DM Sans / DM Mono).
  Source de vérité = Airtable T5B + T5C (verbatims-preuves lus en base, jamais reformulés).
-->
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilan cognitif — les 4 excellences</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,400&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1ea;--paper:#fbfaf6;--ink:#22201b;--mid:#6b6557;--line:#ddd6c8;
--e:#2f7d4f;--m:#c8a020;--f:#cf7a33;--n:#b6ab97;--accent:#7a3b2e;
--ant:#3a6ea5;--dec:#7a3b2e;--met:#4a7c6f;--vue:#9a7a2e;
--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.02) 1px,transparent 0);background-size:24px 24px;padding:36px 22px 90px}
.wrap{max-width:740px;margin:0 auto}
.kick{font-family:var(--mono);font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent)}
h1{font-family:var(--serif);font-weight:800;font-size:clamp(30px,6vw,44px);line-height:1.04;letter-spacing:-.01em;margin:7px 0 4px}
.badge{display:inline-block;font-family:var(--serif);font-weight:700;font-size:15px;color:var(--accent);margin-bottom:4px}
.dom{color:var(--mid);font-size:14px;font-style:italic;margin-bottom:24px}
.sec{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);font-weight:600;padding-bottom:8px;border-bottom:2px solid var(--line);margin:34px 0 18px}
.sec .n{color:var(--mid);margin-right:8px}
.portrait{background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:6px;padding:18px 22px;font-size:17px;line-height:1.5;margin-bottom:6px;box-shadow:0 10px 30px -24px rgba(0,0,0,.4)}
.ordre{margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--mid);font-style:normal}
.ordre span{text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-right:8px}
.tc{margin:10px 0 14px}
.tc-p{font-size:14.5px;line-height:1.7;margin:0 0 12px}
.tc-h{display:block;font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:16px 0 6px;padding-top:10px;border-top:1px solid #eee8db}
.exc{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:17px 19px;margin-bottom:13px}
.exc-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px}
.exc-tag{font-family:var(--mono);font-weight:600;font-size:11.5px;letter-spacing:.03em;color:#fff;padding:4px 11px;border-radius:4px}
.exc-ant{background:var(--ant)}.exc-dec{background:var(--dec)}.exc-met{background:var(--met)}.exc-vue{background:var(--vue)}
.reg{margin-left:auto;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:3px;cursor:help}
.reg-pr{background:#dff0e4;color:#1c6638}.reg-ra{background:#dfeaf0;color:#1c5066}.reg-rm{background:#f6ead8;color:#8a5510}.reg-ob{background:#efe9dd;color:#6b6557}.reg-ab{background:#f3e2da;color:#9a4020}
.exc-def{font-size:14px;color:#46423a;line-height:1.55;margin-bottom:13px;padding-bottom:12px;border-bottom:1px dashed var(--line)}
.bar{display:flex;height:9px;border-radius:5px;overflow:hidden;background:#ece6d8;margin-bottom:10px}
.bar span{height:100%}
.counts{display:flex;flex-wrap:wrap;gap:11px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--mid);margin-bottom:12px}
.counts span{display:flex;align-items:center;gap:5px}.counts i{width:9px;height:9px;border-radius:2px;display:inline-block}
.dens-badge{margin-left:auto;background:var(--ink);color:#f4f1ea;padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:.04em}
.amp{font-size:14.5px;line-height:1.55;margin-bottom:9px}
.decl{font-size:12.5px;color:#46423a;background:#f3eede;border-radius:6px;padding:9px 12px;margin-bottom:13px}
.decl-l{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:2px}
.proof{background:#faf8f2;border:1px solid var(--line);border-radius:7px;padding:12px 14px;margin-bottom:12px}
.proof-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);margin-bottom:7px}

.vb-lvl.e{background:var(--e)}.vb-lvl.m{background:var(--m)}
.vb-q{display:flex;gap:10px;align-items:baseline;padding:4px 0;font-size:13.5px}

.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}

.face{background:var(--paper);border:1px solid var(--line);border-radius:8px;overflow:hidden}

.v-ok{color:#bfe8cf}.v-mid{color:#f3dca0}.v-warn{color:#f0c8a8}
.pal-montee{font-size:13.5px;color:#46423a;background:#eef3ee;border-left:3px solid var(--e);border-radius:0 7px 7px 0;padding:11px 14px;margin-top:9px;line-height:1.5}
.pal-montee b{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px;color:#1c6638}

.reserve{margin-top:16px;font-size:12.5px;color:#46423a;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:11px 14px;line-height:1.5}
.reserve b{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);display:block;margin-bottom:4px}
.foot{text-align:center;margin-top:30px;font-family:var(--mono);font-size:10px;color:var(--mid);line-height:1.7}
.dec-intro{font-size:13.5px;color:#46423a;line-height:1.55;margin-bottom:16px}
.jauges{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.jcol{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:16px 14px;display:flex;flex-direction:column;align-items:center}
.jg{width:100%;height:120px;background:#ece6d8;border-radius:7px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.jg-fill{width:100%;border-radius:0 0 7px 7px;transition:height .3s}
.jg-trav{background:linear-gradient(180deg,#5a8ec0,#3a6ea5)}
.jg-rev{background:linear-gradient(180deg,#6aa99b,#4a7c6f)}
.jg-na{height:100%;background:repeating-linear-gradient(45deg,#ece6d8,#ece6d8 7px,#e0d8c8 7px,#e0d8c8 14px)}
.jg-lab{text-align:center;margin-top:11px;font-weight:700;font-size:14px;line-height:1.25}
.jg-kick{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);font-weight:600;margin-bottom:3px}
.jg-val{margin-top:7px;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ink);background:#f3eede;padding:3px 11px;border-radius:16px}
.jg-val-na{color:var(--mid);font-weight:600;font-size:10.5px;text-align:center}
.decoupage{font-size:14px;color:var(--ink);background:linear-gradient(160deg,#fdf6ec,#f6ece0);border:1px solid #e4d5bf;border-radius:8px;padding:13px 16px;line-height:1.5;font-style:italic}
.dc-k{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-style:normal;font-weight:600;display:block;margin-bottom:4px}
.sommet-mini{margin-top:12px;font-size:13px;color:#46423a;background:#f1ede4;border-radius:8px;padding:12px 15px;line-height:1.5}
.sm-k{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-right:7px}
.state{max-width:740px;margin:60px auto;text-align:center;color:var(--mid);font-size:15px;line-height:1.7}
.state .kick{display:block;margin-bottom:10px}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:560px){.faces,.jauges{grid-template-columns:1fr}.dgrid{grid-template-columns:repeat(2,1fr)}.vb-s{min-width:66px}}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ====== util ======
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getCandidatId(){
  // priorité : ?c=...  sinon dernier segment d'URL /bilan/:id
  var u=new URL(window.location.href);
  var c=u.searchParams.get('c')||u.searchParams.get('candidat_id');
  if(c) return c.trim();
  var seg=u.pathname.split('/').filter(Boolean);
  if(seg.length) return decodeURIComponent(seg[seg.length-1]);
  return null;
}
function setState(html){document.getElementById('root').innerHTML=html;}
function loading(){setState('<div class="state"><div class="spinner"></div><span class="kick">Profil cognitif</span>Chargement du bilan…</div>');}
function errorState(msg){setState('<div class="state"><span class="kick">Bilan indisponible</span>'+esc(msg)+'</div>');}

// ====== ordre des excellences par amplitude (E×3+M×2+F) ======
var EXC_META={
 ANT:{tag:'exc-ant',nom:'Anticipation spontanée',
   def:"Se projeter spontanément dans le futur pour préparer une réponse avant que la situation n'arrive : dérouler les « si… alors… », envisager les conséquences en cascade, tenir prêts des plans de secours. Ce qui la distingue : elle agit sur ce qui n'existe pas encore, là où la simple réaction traite ce qui est déjà là."},
 VUE:{tag:'exc-vue',nom:'Vue systémique',
   def:"Percevoir une situation présente comme un système : non pas des éléments séparés, mais les liens entre eux et la façon dont agir sur l'un réorganise les autres. Ce qui la distingue : elle saisit les interdépendances d'un ensemble, là où une simple liste juxtapose des éléments sans voir ce qui les relie."},
 MET:{tag:'exc-met',nom:'Méta-cognition',
   def:"Observer et nommer sa propre façon de penser : décrire comment on trie, comment on décide, par quels mécanismes mentaux on procède. Ce qui la distingue : elle porte sur la pensée elle-même (« je range les infos comme des valises »), pas sur l'action menée (« je cherche sur internet »)."},
 DEC:{tag:'exc-dec',nom:'Décentration cognitive',
   def:"Adopter réellement le référentiel d'une autre entité — partir de sa façon de faire, de penser ou de vivre, plutôt que d'y appliquer la sienne. Ce qui la distingue : elle change de point d'ancrage (« de SON point de vue à lui »), là où la bienveillance ou la coordination impliquent l'autre sans quitter son propre cadre."}
};
var REG_CLASS={'RÉGULIÈRE ET ANCRÉE':'reg-ra','ANCRÉE EN RÉGIME MODÉRÉ':'reg-rm','OBSERVÉE':'reg-ob','ABSENTE':'reg-ab','PRÉSENTE ET ROBUSTE':'reg-pr'};
var REG_TITLE={'RÉGULIÈRE ET ANCRÉE':'Disponible au quotidien, à intensité variable selon les situations.','ANCRÉE EN RÉGIME MODÉRÉ':'Présente de façon régulière, sans atteindre souvent son plein régime.','OBSERVÉE':"À activation restreinte ; s'exprime dans des situations spécifiques.",'ABSENTE':'Quasiment pas activée sur ce test.','PRÉSENTE ET ROBUSTE':'Disponible et solide dans la plupart des situations.'};

function fmtScenQ(v){ // {scenario,q} -> "PANNE·Q22"
  return esc(v.scenario)+'·Q'+esc(v.q);
}

// 🔒 Lexique PAR DIMENSION (garante, 09/07) : les mêmes modes, expliqués dans
// la langue de chaque capacité — le candidat se compare sur la bonne échelle.
var LEXIQUE_MODES={
ANT:[
 ['RÉGULIÈRE ET ANCRÉE','le coup d\'avance est votre façon de penser : vous préparez l\'action avant l\'événement dans la plupart des situations, jusqu\'aux plans à plusieurs coups.'],
 ['ANCRÉE EN RÉGIME MODÉRÉ','prévoir pour agir fait partie de votre pensée et s\'exprime régulièrement — le plus souvent au premier coup d\'avance.'],
 ['MOBILISABLE EN SITUATION','le coup d\'avance est là, avec de vrais pics : il s\'allume quand l\'enjeu ou l\'imprévu l\'appellent.'],
 ['À DÉVELOPPER','le geste de prévoir s\'est montré ponctuellement dans ce parcours — un terrain existe, la pratique peut l\'étendre.'],
 ['À EXPLORER','ce parcours n\'a pas créé les conditions pour voir ce geste — rien n\'est dit sur son absence : il reste à découvrir.']
],
MET:[
 ['RÉGULIÈRE ET ANCRÉE','vous vous regardez penser spontanément : vos critères, vos signaux d\'arrêt, votre rythme sont nommés dans la plupart des situations.'],
 ['ANCRÉE EN RÉGIME MODÉRÉ','savoir décrire comment vous vous y prenez fait partie de votre pensée et s\'exprime régulièrement.'],
 ['MOBILISABLE EN SITUATION','ce regard intérieur est là, avec de vrais pics : il s\'ouvre quand un blocage ou un choix difficile l\'appelle.'],
 ['À DÉVELOPPER','ce regard sur vous-même s\'est montré ponctuellement dans ce parcours — un terrain existe, la pratique peut l\'étendre.'],
 ['À EXPLORER','ce parcours n\'a pas créé les conditions pour voir ce regard — rien n\'est dit sur son absence : il reste à découvrir.']
],
VUE:[
 ['RÉGULIÈRE ET ANCRÉE','lire les liens entre les choses est votre façon de voir : les interdépendances vous apparaissent dans la plupart des situations, y compris à froid.'],
 ['ANCRÉE EN RÉGIME MODÉRÉ','la lecture des liens fait partie de votre pensée et s\'exprime régulièrement, en régime courant.'],
 ['MOBILISABLE EN SITUATION','cette lecture est là, avec de vrais pics : elle s\'allume quand plusieurs fronts s\'imposent en même temps.'],
 ['À DÉVELOPPER','la lecture des liens s\'est montrée ponctuellement dans ce parcours — un terrain existe, la pratique peut l\'étendre.'],
 ['À EXPLORER','ce parcours n\'a pas créé les conditions pour voir cette lecture — rien n\'est dit sur son absence : elle reste à découvrir.']
],
DEC:[
 ['RÉGULIÈRE ET ANCRÉE','raisonner depuis les autres est votre façon d\'agir : vous partez de leur fonctionnement jusqu\'à laisser faire — et faire réussir chacun à sa façon.'],
 ['ANCRÉE EN RÉGIME MODÉRÉ','la prise en compte du fonctionnement des autres fait partie de votre façon d\'agir et s\'exprime régulièrement.'],
 ['MOBILISABLE EN SITUATION','cette bascule vers l\'autre est là, avec de vrais pics : elle s\'active quand la situation met l\'autre au premier plan.'],
 ['À DÉVELOPPER','la bascule vers le fonctionnement de l\'autre s\'est montrée ponctuellement — un terrain existe, la pratique peut l\'étendre.'],
 ['À EXPLORER','ce parcours n\'a pas créé les conditions pour la voir — rien n\'est dit sur son absence : elle reste à découvrir.'],
 ['TEST À PASSER','cette dimension demande une fenêtre dédiée : un test court, construit sur votre propre parcours, complète la mesure.']
]};

// 🔒 Mise en forme du texte candidat (garante, 09/07) : les quatre intertitres
// canoniques deviennent des titres stylés, les retours à la ligne deviennent des
// paragraphes — y compris pour les textes déjà en base (variantes MAJUSCULES et
// titres tissés reconnus).
function fmtTexteCandidat(t){
  if(!t) return '';
  var h = esc(t);
  var TITRES=[
    ['Ce que cette faculté ajoute à votre moteur','CE QUE CETTE FACULTÉ AJOUTE À VOTRE MOTEUR'],
    ['Là où elle s\'allume le plus naturellement','LÀ OÙ ELLE S\'ALLUME LE PLUS NATURELLEMENT'],
    ['Là où elle est restée discrète dans ce parcours','LÀ OÙ ELLE EST RESTÉE DISCRÈTE'],
    ['Le geste qui la ferait grandir','LE GESTE QUI LA FERAIT GRANDIR'],
    ['Ce qui peut la faire grandir','CE QUI PEUT LA FAIRE GRANDIR']
  ];
  TITRES.forEach(function(p){
    var canon=p[0], caps=p[1];
    // variantes reconnues : le titre canonique, sa version MAJUSCULES (avec
    // suite éventuelle sur la même ligne — textes historiques), insensible à la
    // position (début de ligne ou tissé après un point).
    var reCaps=new RegExp('(\\s*)'+caps.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[^\n]{0,40}?(?=[A-ZÀ-Ü«])','');
    var reCanon=new RegExp('(^|\n)\\s*'+canon.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*(\n|$)','');
    var header='\n\n<span class="tc-h">'+canon+'</span>\n';
    h=h.replace(reCanon, header).replace(reCaps, header);
  });
  // paragraphes : double saut = espace de section, simple saut = retour
  h=h.replace(/\n{2,}/g,'</p><p class="tc-p">').replace(/\n/g,'<br>');
  return '<div class="tc"><p class="tc-p">'+h+'</p></div>';
}

// 🔒 Mise en forme des pavés de la partie 2 (garante, 10/07) : paragraphes,
// puces et blocs titrés — y compris en dégradé propre pour les textes en base.
function fmtParas(t){
  if(!t) return '';
  return '<p class="fp">'+esc(t).replace(/\n{2,}/g,'</p><p class="fp">').replace(/\n/g,'<br>')+'</p>';
}
function fmtConditions(t){
  if(!t) return '';
  var lignes=String(t).split(/\n+/).map(function(l){return l.trim();}).filter(Boolean);
  var aPuces=lignes.some(function(l){return /^[•\-–]\s/.test(l);});
  if(!aPuces) return fmtParas(t); // texte historique : paragraphes propres
  var out='';
  lignes.forEach(function(l){
    if(/^[•\-–]\s/.test(l)) out+='<div class="cond-li">'+esc(l.replace(/^[•\-–]\s*/,''))+'</div>';
    else out+='<p class="fp">'+esc(l)+'</p>';
  });
  return out;
}
function fmtMontee(t){
  if(!t) return '';
  var h=esc(t);
  ['Le but','Le levier','Le geste'].forEach(function(titre){
    var re=new RegExp('(^|\\n)\\s*'+titre+'\\s*(:|—)?\\s*(\\n|(?=[A-ZÀ-Ü«]))');
    h=h.replace(re,'\n\n<span class="mt-h">'+titre+'</span>\n');
  });
  return '<p class="fp">'+h.replace(/\n{2,}/g,'</p><p class="fp">').replace(/\n/g,'<br>')+'</p>';
}

function renderLexique(code,badge){
  var lex=LEXIQUE_MODES[code]||[];
  if(!lex.length) return '';
  var b=(badge||'').toUpperCase();
  var rows='';
  lex.forEach(function(m){
    var actif=(m[0]===b);
    rows+='<div style="display:grid;grid-template-columns:auto 1fr;gap:0 12px;padding:5px 8px;border-radius:5px;'
      +(actif?'background:#f1ece0;border-left:3px solid #7a3b2e;':'')
      +'"><span style="font-weight:700;white-space:nowrap;font-size:11.5px;letter-spacing:.04em;'+(actif?'color:#7a3b2e;':'color:#8a8574;')+'">'
      +(actif?'▸ ':'')+m[0]+'</span><span style="font-size:12.5px;color:'+(actif?'#3d3a30':'#8a8574')+';">'+m[1]+'</span></div>';
  });
  return '<div style="margin-top:14px;padding:12px 14px;background:#fbfaf6;border:1px solid #e5dfd2;border-radius:8px;">'
    +'<div style="font-size:11px;letter-spacing:.12em;color:#8a8574;font-weight:700;margin-bottom:8px;">LES MODES DE CETTE CAPACITÉ — LE VÔTRE EST MARQUÉ</div>'
    +rows+'</div>';
}

function renderExc(e){
  var meta=EXC_META[e.code]||{tag:'',nom:e.code,def:''};
  // 🔒 Bilan de CAPACITÉS (garante, 09/07) : l'absence ne s'affiche jamais.
  // La couche technique (pattern ABSENTE, comptages) reste en base ; à l'écran :
  // vide + pédagogie dans le texte candidat. DEC insuffisante → « Test à passer ».
  var ng=String(e.niveau_global||'');
  var decTest=(e.code==='DEC')&&(ng.indexOf('Non évalué')===0||ng.toLowerCase().indexOf('test à passer')>=0);
  var masquer=decTest||e.pattern==='ABSENTE'||!e.pattern;
  // Falaise adoucie (garante, 09/07) : OBSERVÉE avec au moins un ÉLEVÉ = une
  // capacité conditionnelle réelle — jamais « à développer », qui la déclasserait.
  var badge=decTest?'Test à passer':(masquer?'à explorer':(e.pattern==='OBSERVÉE'?(((e.nb_eleve||0)>=1)?'mobilisable en situation':'à développer'):(e.pattern||'')));
  var tot=e.nb_eleve+e.nb_moyen+e.nb_faible+e.nb_nulle;
  function pct(n){return tot?(100*n/tot).toFixed(1):0;}
  var regc=REG_CLASS[e.pattern]||'reg-ob';
  var regt=REG_TITLE[e.pattern]||'';
  // verbatims-preuves : déjà sélectionnés/triés en base (ÉLEVÉ puis MOYEN)
  var pv=e.verbatims_preuves||[];
  var ele=pv.filter(function(x){return (x.niveau||'').indexOf('ÉLEV')===0;});
  var moy=pv.filter(function(x){return (x.niveau||'').indexOf('MOY')===0;});
  var proof='';
  if(pv.length){
    proof='<div class="proof"><div class="proof-h">Ce qu\'on entend dans ses réponses</div>';
    if(ele.length){
      proof+='<div class="vb-h"><span class="vb-lvl e">à plein régime · ÉLEVÉ</span></div>';
      ele.forEach(function(x){proof+='<div class="vb-q"><span class="vb-s">'+fmtScenQ(x)+'</span><span>« '+esc(x.texte)+' »</span></div>';});
    }
    if(moy.length){
      proof+='<div class="vb-h"><span class="vb-lvl m">régime courant · MOYEN</span></div>';
      moy.forEach(function(x){proof+='<div class="vb-q"><span class="vb-s">'+fmtScenQ(x)+'</span><span>« '+esc(x.texte)+' »</span></div>';});
    }
    proof+='</div>';
  }
  var dg='';
  ['sommeil','weekend','animal','panne'].forEach(function(s){
    dg+='<div class="dcell"><span class="ds">'+s+'</span><span class="dv">'+esc(e['densite_'+s]||'—')+'</span></div>';
  });
  return '<div class="exc">'
    +'<div class="exc-head"><span class="exc-tag '+meta.tag+'">'+esc(meta.nom)+'</span>'
    +'<span class="reg '+(masquer?'reg-ob':regc)+'" title="'+esc(regt)+'">'+esc(badge)+'</span></div>'
    +'<p class="exc-def">'+esc(meta.def)+'</p>'
    +(e.texte_candidat?fmtTexteCandidat(e.texte_candidat):'')
    +(false?'':(
      '<div class="bar"><span style="width:'+pct(e.nb_eleve)+'%;background:var(--e)"></span><span style="width:'+pct(e.nb_moyen)+'%;background:var(--m)"></span><span style="width:'+pct(e.nb_faible)+'%;background:var(--f)"></span><span style="width:'+pct(e.nb_nulle)+'%;background:var(--n)"></span></div>'
      +'<div class="counts"><span><i style="background:var(--e)"></i>'+e.nb_eleve+' élevé</span><span><i style="background:var(--m)"></i>'+e.nb_moyen+' moyen</span><span><i style="background:var(--f)"></i>'+e.nb_faible+' faible</span><span class="dens-badge">'+esc(e.niveau_global)+'</span></div>'
      +'<p class="amp">'+esc(e.synthese)+'</p>'
      +'<div class="decl"><span class="decl-l">Quand ça s\'active</span>'+esc(e.declencheur)+'</div>'
      +proof
      +'<div class="dgrid">'+dg+'</div>'))
    +renderLexique(e.code,badge)
    +'</div>';
}

// ⭐ Le résultat du test complémentaire (garante, 09/07) : posé sous la carte
// décentration — le sens de découverte. Il complète la mesure, il n'écrase rien.
function blocTestDec(p){
  var td=p.test_dec;
  return '<div style="margin:18px 0 4px;padding:20px 24px;background:#f6faf6;border:1px solid #cfe0cf;border-left:4px solid #2f7d4f;border-radius:8px;">'
    +'<div style="font-size:12px;letter-spacing:.14em;color:#2f7d4f;font-weight:700;margin-bottom:8px;">VOTRE DÉCENTRATION — AVANT ET APRÈS LE TEST</div>'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:4px;">Décentration cognitive : '+esc(td.niveau_global)+'</div>'
    +'<div style="font-size:12px;color:#6b6557;margin-bottom:12px;">'+esc(td.pattern||'')+' — sur les moments du test qui sollicitent directement cette dimension. Cette mesure complète celle du parcours principal.</div>'
    +(td.synthese?'<p style="margin:0 0 10px;font-size:14px;line-height:1.6;">'+esc(td.synthese)+'</p>':'')
    +(td.portrait_excellence?'<p style="margin:0;font-size:13px;color:#55503f;line-height:1.55;font-style:italic;">'+esc(td.portrait_excellence)+'</p>':'')
    +'</div>';
}
function verdictClass(v){
  v=(v||'').toUpperCase();
  if(v.indexOf('TRÈS BON')>=0||v.indexOf('BON')>=0) return 'v-ok';
  if(v.indexOf('SUFFISANT')>=0) return 'v-mid';
  return 'v-warn';
}

function render(d){
  var p=d.profil;          // T5C
  var excs=d.excellences;  // T5B[]
  // 🔒 Ordre de présentation IMPOSÉ (garante, 09/07) : anticipation, puis
  // méta-cognition, puis vue systémique, puis décentration — jamais l'amplitude.
  var ORDRE_CARTES={ANT:1,MET:2,VUE:3,DEC:4};
  excs=excs.slice().sort(function(a,b){return (ORDRE_CARTES[a.code]||9)-(ORDRE_CARTES[b.code]||9);});
  var html='<div class="wrap">'
    +'<div class="kick">Profil cognitif · les 4 excellences · bilan personnel</div>'
    +'<h1>'+esc(p.prenom)+'</h1>'
    +'<div class="badge">'+esc(p.etiquette)+'</div>'
    +'<p class="dom">'+esc(p.dominante)+'</p>'
    // 01
    +'<div class="sec"><span class="n">01</span>En un mot</div>'
    +'<div class="portrait">'+esc(p.portrait)
      +'<div class="ordre"><span>Ordre d\'amplitude</span> '+esc(p.ordre)+'</div></div>'
    // 02
    +'<div class="sec"><span class="n">02</span>Les quatre capacités, en détail</div>'
    // 🔒 Lexique (garante, 09/07) : qualifier le mode n'est pas poser une note —
    // c'est nommer la façon dont la dimension s'exprime. Le détail des modes est
    // PAR DIMENSION, sur chaque carte (les modes ne disent pas la même chose
    // pour les quatre capacités).
    +'<div style="margin:0 0 20px;padding:12px 20px;background:#fbfaf6;border:1px solid #ddd6c8;border-radius:8px;font-size:13px;line-height:1.6;color:#55503f;">'
      +'<b style="color:#2b2822;">Comment lire les libellés.</b> Chaque capacité porte un libellé qui nomme son <b>mode d\'expression</b> dans ce parcours — ce n\'est pas une note. Sous chaque capacité, l\'échelle de ses modes vous est donnée, avec le vôtre marqué.'
    +'</div>';
  excs.forEach(function(e){
    html+=renderExc(e);
    // 🔒 Sens de découverte (garante, 09/07) : tout ce qui concerne le TEST de
    // décentration vit ICI, à la suite de l'analyse décentration — jamais ailleurs.
    if(e.code==='DEC'){
      if(p.test_dec && p.test_dec.niveau_global){
        html+=blocTestDec(p);
      } else if(p.test_dec_statut==='en_analyse'){
        html+='<div style="margin:-8px 0 18px;padding:16px 20px;background:#fbfaf6;border:1px solid #ddd6c8;border-left:4px solid #b8860b;border-radius:8px;">'
          +'<div style="font-size:14px;font-weight:700;margin-bottom:4px;">Votre test complémentaire est en cours d\'analyse</div>'
          +'<p style="margin:0;color:#55503f;font-size:13px;line-height:1.55;">Comptez une dizaine de minutes — <b>cette page se mettra à jour automatiquement</b>.</p>'
          +'</div>';
      } else {
        var enReprise = (p.test_dec_statut==='reprise');
        var tdm2 = enReprise || p.test_dec_mode || (String(p.verdict_man_niveau||'').toUpperCase()==='RÉSERVE DE PROTOCOLE' ? 'remede' : null);
        if(tdm2){
          var cid2=location.pathname.split('/').pop();
          var titreInv = enReprise ? 'Reprenez votre test complémentaire'
                       : (tdm2==='remede'?'Un test complémentaire vous est proposé':'Affinez cette mesure');
          var texteInv = enReprise
            ? 'Votre passation est entamée : <b>'+(p.test_dec_repondues||1)+' réponse'+((p.test_dec_repondues||1)>1?'s':'')+' sur '+(p.test_dec_total||4)+' déjà enregistrée'+((p.test_dec_repondues||1)>1?'s':'')+'</b>. Vous reprendrez exactement où vous vous êtes arrêté·e — votre bilan sera automatiquement actualisé après analyse.'
            : 'Ce parcours n\'a pas assez sollicité cette dimension pour la mesurer de façon fiable. Quatre moments courts (environ 10 minutes) permettront de compléter votre bilan — il sera automatiquement actualisé après analyse.';
          var boutonInv = enReprise ? 'Reprendre votre test →' : 'Passer le test complémentaire →';
          html+='<div style="margin:-8px 0 18px;padding:16px 20px;background:#fbfaf6;border:1px solid #ddd6c8;border-left:4px solid #7a3b2e;border-radius:8px;">'
            +'<div style="font-size:14px;font-weight:700;margin-bottom:4px;">'+titreInv+'</div>'
            +'<p style="margin:0 0 12px;color:#55503f;font-size:13px;line-height:1.55;">'+texteInv+'</p>'
            +'<a href="/visualiser/test-decentration/'+encodeURIComponent(cid2)+'" target="_blank" rel="noopener" style="display:inline-block;padding:10px 20px;background:#7a3b2e;color:#fff;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;">'+boutonInv+'</a>'
            +'<span style="display:block;margin-top:8px;font-size:12px;color:#8a8574;">Le test s\'ouvre dans un nouvel onglet — votre bilan reste ouvert ici.</span>'
            +'</div>';
        }
      }
    }
  });
  // combinaison
  html+='<div class="combi"><div class="combi-h">Ce que ça donne en combinaison</div><p>'+esc(p.combinaison)+'</p></div>';
  // 03
  // Jauges de verdict — définies AVANT leur usage (bug 09/07 corrigé), avec
  // garde défensif si le C n'a pas produit les jauges.
  var trav=p.jauge_trav||{na:true,val:'—',pct:0}; // {pct, val, na}
  var rev=p.jauge_rev||{na:true,val:'—',pct:0};
  function jcol(j,cls,kick,lab){
    var fill = j.na
      ? '<div class="jg-fill jg-na"></div>'
      : '<div class="jg-fill '+cls+'" style="height:'+j.pct+'%"></div>';
    var val = j.na
      ? '<span class="jg-val jg-val-na">'+esc(j.val)+'</span>'
      : '<span class="jg-val">'+esc(j.val)+'</span>';
    return '<div class="jcol"><div class="jg">'+fill+'</div>'
      +'<div class="jg-lab"><span class="jg-kick">'+kick+'</span>'+lab+'</div>'+val+'</div>';
  }
  html+='<div class="sec"><span class="n">03</span>Les deux faces du métier de manager</div>'
    // 🔒 Pédagogie (garante, 09/07) : dire ce que sont les deux faces et COMMENT
    // l'avis se construit, AVANT de montrer les deux blocs — sinon ils ne se
    // comprennent pas.
    +'<div style="margin:0 0 18px;padding:18px 22px;background:#fbfaf6;border:1px solid #ddd6c8;border-radius:8px;font-size:14px;line-height:1.65;color:#3d3a30;">'
      +'<b>Comprendre avant de lire.</b> Encadrer et manager sont deux métiers dans le même métier, et ils ne mobilisent pas les mêmes capacités — c\'est pourquoi votre bilan pose <b>deux avis séparés</b>, construits chacun à partir de deux de vos quatre capacités :'
      +'<div style="margin:12px 0 0;display:grid;grid-template-columns:1fr 1fr;gap:14px;">'
        +'<div style="padding:12px 14px;background:#fff;border:1px solid #e5dfd2;border-radius:6px;"><div style="font-size:11px;letter-spacing:.12em;color:#7a3b2e;font-weight:700;margin-bottom:6px;">LE TRAVAIL — ENCADRER</div>Faire avancer le travail collectif : préparer, organiser, sécuriser, tenir les délais et les imprévus. Cet avis se lit sur votre <b>anticipation spontanée</b> (le coup d\'avance) et votre <b>vue systémique</b> (tenir l\'ensemble et ses liens).</div>'
        +'<div style="padding:12px 14px;background:#fff;border:1px solid #e5dfd2;border-radius:6px;"><div style="font-size:11px;letter-spacing:.12em;color:#7a3b2e;font-weight:700;margin-bottom:6px;">LA PERSONNE — MANAGER</div>Révéler le potentiel de chacun : comprendre comment l\'autre fonctionne, le laisser réussir à sa façon, le faire progresser avec ses propres qualités. <i>Pensez à l\'entraîneur d\'une équipe : il fixe l\'objectif — gagner le match — mais jamais il ne vient sur le terrain jouer à la place d\'un joueur. Il connaît la façon de jouer de chacun, développe les qualités de chacun, et son art est de combiner les talents.</i> Cet avis se lit sur votre <b>décentration cognitive</b> (raisonner depuis l\'autre) et votre <b>méta-cognition</b> (se regarder faire pour ajuster).</div>'
      +'</div>'
      +'<div style="margin-top:12px;font-size:13px;color:#6b6557;">Les deux faces ne s\'additionnent pas : on peut exceller sur l\'une et avoir l\'autre à construire — c\'est précisément ce que ce bilan veut vous montrer, avec les améliorations possibles pour chacune.</div>'
    +'</div>'
    +'<div class="jauges">'+jcol(trav,'jg-trav','Le travail','Faire avancer le travail')+jcol(rev,'jg-rev','La personne','Révéler le potentiel de chacun')+'</div>'
    +'<div class="faces">'
    +'<div class="face"><div class="face-top face-trav"><span class="face-kick">Le travail</span><span class="face-v '+verdictClass(p.verdict_enc)+'">'+esc(p.verdict_enc)+'</span></div>'
      +'<div class="face-lab">Faire avancer le travail</div><div class="face-why">'+fmtParas(p.conclusions_enc)+'</div>'
      +'<div class="face-cond"><b>Conditions</b>'+fmtConditions(p.conditions_enc)+'</div></div>'
    +'<div class="face"><div class="face-top face-rev"><span class="face-kick">La personne</span><span class="face-v '+verdictClass(p.verdict_man)+'">'+esc(p.verdict_man)+'</span></div>'
      +'<div class="face-lab">Révéler le potentiel de chacun</div><div class="face-why">'+fmtParas(p.conclusions_man)+'</div>'
      +'<div class="face-cond"><b>Conditions</b>'+fmtConditions(p.conditions_man)+'</div>'
      +'</div>'
    +'</div>';
  // ⭐ Rechargement automatique pendant l'analyse du test (l'encart visuel vit
  // désormais sous la carte décentration — sens de découverte, garante 09/07).
  if(!p.test_dec && p.test_dec_statut==='en_analyse'){
    setTimeout(function verifierTest(){
      var id=location.pathname.split('/').pop();
      fetch('/api/etape2_2bilan4excellences/'+encodeURIComponent(id),{headers:{'Accept':'application/json'}})
        .then(function(r){return r.ok?r.json():null;})
        .then(function(d){
          if(d&&d.profil&&d.profil.test_dec&&d.profil.test_dec.niveau_global){location.reload();}
          else{setTimeout(verifierTest,30000);}
        })
        .catch(function(){setTimeout(verifierTest,30000);});
    },30000);
  }
  // 04
  html+='<div class="sec"><span class="n">04</span>Vos améliorations possibles</div>'
    +'<div class="decoupage"><span class="dc-k">Votre lecture d\'ensemble</span> '+esc(p.decoupage)+'</div>'
    +'<div class="pal-montee"><b>Ce qui ferait grandir l\'autre face</b>'+fmtMontee(p.montee)+'</div>'
    +'<div class="sommet-mini"><span class="sm-k">Horizon</span> Le <b>manager d\'exception</b> réunit les deux faces solides à la fois : faire avancer le travail <em>et</em> révéler le potentiel de chacun. C\'est un profil rare, car il demande deux logiques d\'excellences presque inversées.</div>'
    +'<div class="foot">Méthode des 4 excellences cognitives · bilan individuel · à lire avec l\'accompagnement d\'un praticien</div>'
    +'</div>';
  // Couche praticien (garante, 09/07) : la « Note de lecture » technique
  // (p.reserve — seuils, patterns, comptages) ne s'affiche PLUS au candidat.
  // Elle reste en base pour la garante et le recruteur.
  setState(html);
  document.title='Bilan cognitif — '+(p.prenom||'');
}

// ====== chargement ======
function boot(){
  var id=getCandidatId();
  if(!id){errorState("Aucun identifiant de candidat dans l'adresse.");return;}
  loading();
  fetch('/api/etape2_2bilan4excellences/'+encodeURIComponent(id),{headers:{'Accept':'application/json'}})
    .then(function(r){
      if(!r.ok) throw new Error('Bilan introuvable pour cet identifiant ('+r.status+').');
      return r.json();
    })
    .then(function(d){
      if(!d||!d.profil||!d.excellences){throw new Error('Données de bilan incomplètes.');}
      render(d);
    })
    .catch(function(err){errorState(err.message||'Erreur de chargement.');});
}
boot();
</script>
